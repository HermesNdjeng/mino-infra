# Prometheus scrape configuration for MinIO
# Add this job to your prometheus.yml under scrape_configs:
#
#   scrape_configs:
#     - job_name: minio
#       static_configs:
#         - targets: ['minio:9000']
#       metrics_path: /minio/v2/metrics/cluster
#       bearer_token: '<your-prometheus-bearer-token>'
#
# Or use this file as a ServiceMonitor if using kube-prometheus-stack.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: minio-infra
  labels:
    app: minio
spec:
  selector:
    matchLabels:
      app: minio
  endpoints:
    - port: api
      path: /minio/v2/metrics/cluster
      interval: 30s
      # MinIO requires a bearer token for the metrics endpoint.
      # Generate one with: mc admin prometheus generate <alias>
      # Then store it in a Secret and reference it here:
      bearerTokenSecret:
        name: minio-prometheus-token
        key: token
